# Default values for integration tests.
# This file takes precedence over agent jar application.yml files on the classpath,
# so it must provide all properties that integration tests rely on.

spring:
  ai:
    a2a:
      remote:
        agents:
          order-agent:
            url: http://localhost:19901
          delivery-agent:
            url: http://localhost:19902
          payment-agent:
            url: http://localhost:19903

aws:
  bedrock:
    agent-core:
      memory:
        mode: none
        memory-id: ""
        strategy-id: ""
        short-term-max-turns: 10
        long-term-max-results: 4
