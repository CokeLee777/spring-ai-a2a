server:
  port: 8080

spring:
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:ap-northeast-2}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:}

remote:
  agents:
    order-agent:
      url: ${ORDER_AGENT_URL:}
    delivery-agent:
      url: ${DELIVERY_AGENT_URL:}
    payment-agent:
      url: ${PAYMENT_AGENT_URL:}

aws:
  bedrock:
    agent-core:
      memory:
        mode: ${BEDROCK_MEMORY_MODE:none}
        memory-id: ${BEDROCK_MEMORY_ID:}
        strategy-id: ${BEDROCK_MEMORY_STRATEGY_ID:}
        short-term-max-turns: 10
        long-term-max-results: 4
