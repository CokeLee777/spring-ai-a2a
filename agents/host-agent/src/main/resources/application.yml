server:
  port: 8080

spring:
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:ap-northeast-2}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:arn:aws:bedrock:ap-northeast-2:<ACCOUNT_ID>:inference-profile/apac.amazon.nova-lite-v1:0}

remote:
  agents:
    order-agent:
      url: ${ORDER_AGENT_URL:arn:aws:bedrock-agentcore:ap-northeast-2:<ACCOUNT_ID>:runtime/order-agent}
    delivery-agent:
      url: ${DELIVERY_AGENT_URL:arn:aws:bedrock-agentcore:ap-northeast-2:<ACCOUNT_ID>:runtime/delivery-agent}
    payment-agent:
      url: ${PAYMENT_AGENT_URL:arn:aws:bedrock-agentcore:ap-northeast-2:<ACCOUNT_ID>:runtime/payment-agent}
