server:
  port: 8080

spring:
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:ap-northeast-2}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:amazon.nova-pro-v1:0}

remote:
  agents:
    order-agent:
      url: ${ORDER_AGENT_URL:http://localhost:9000}
    delivery-agent:
      url: ${DELIVERY_AGENT_URL:http://localhost:9000}
    payment-agent:
      url: ${PAYMENT_AGENT_URL:http://localhost:9000}
