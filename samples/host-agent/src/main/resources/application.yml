server:
  port: 8080

spring:
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:ap-northeast-2}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:}
    chat:
      memory:
        repository:
          bedrock:
            agent-core:
              memory-id: ${BEDROCK_MEMORY_ID:}
              max-turns: 10

remote:
  agents:
    order-agent:
      url: ${ORDER_AGENT_URL:}
    delivery-agent:
      url: ${DELIVERY_AGENT_URL:}
    payment-agent:
      url: ${PAYMENT_AGENT_URL:}
